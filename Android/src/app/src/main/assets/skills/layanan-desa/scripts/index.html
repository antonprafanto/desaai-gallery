<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f3f6fd; color: #1a237e; font-size: 14px; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 17px; color: #1565c0; margin-bottom: 4px; }
  .subtitle { color: #5c6bc0; font-size: 12px; margin-bottom: 14px; }
  .badge { display: inline-block; background: #e3f2fd; color: #1565c0; border-radius: 20px;
    padding: 3px 10px; font-size: 11px; font-weight: 600; margin-bottom: 12px; }
  .card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
  .card-title { font-weight: 700; color: #1565c0; margin-bottom: 8px; font-size: 14px; }
  .step { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .step-num { min-width: 22px; height: 22px; border-radius: 50%; background: #1565c0;
    color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center;
    justify-content: center; }
  .step-text { color: #333; line-height: 1.4; font-size: 13px; }
  .syarat-list { padding-left: 16px; }
  .syarat-list li { color: #444; font-size: 13px; margin-bottom: 4px; line-height: 1.4; }
  .info-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .info-label { min-width: 80px; font-size: 12px; color: #777; }
  .info-val { font-size: 12px; color: #333; font-weight: 500; }
  .alert { background: #fff3e0; border-left: 4px solid #ff9800; border-radius: 4px;
    padding: 10px 12px; font-size: 12px; color: #e65100; line-height: 1.5; margin-top: 10px; }
  .tip { background: #e8f5e9; border-left: 4px solid #43a047; border-radius: 4px;
    padding: 10px 12px; font-size: 12px; color: #2e7d32; line-height: 1.5; margin-top: 10px; }
  .free-tag { background: #c8e6c9; color: #1b5e20; border-radius: 10px;
    padding: 2px 8px; font-size: 11px; font-weight: 700; }
</style>
</head>

function render(kode, pertanyaan) {
  const d = LAYANAN[kode] || LAYANAN.bansos;

  document.getElementById("title").textContent = d.icon + " " + d.judul;
  document.getElementById("subtitle").textContent = pertanyaan ? ("Pertanyaan: " + pertanyaan) : "Panduan lengkap dari kantor desa";
  document.getElementById("badge").textContent = d.badge;

  let html = "";

  // Info ringkas
  html += `<div class="card">
    <div class="card-title">ℹ️ Informasi Umum</div>
    <div class="info-row"><span class="info-label">💸 Biaya</span><span class="info-val"><span class="free-tag">${d.biaya}</span></span></div>
    <div class="info-row"><span class="info-label">⏱️ Waktu</span><span class="info-val">${d.waktu}</span></div>
    <div class="info-row"><span class="info-label">🏛️ Tempat</span><span class="info-val">${d.kantor}</span></div>
  </div>`;

  // Syarat
  html += `<div class="card">
    <div class="card-title">📋 Dokumen yang Diperlukan</div>
    <ul class="syarat-list">`;
  d.syarat.forEach(s => { html += `<li>${s}</li>`; });
  html += `</ul></div>`;

  // Langkah
  html += `<div class="card">
    <div class="card-title">🪜 Langkah-langkah</div>`;
  d.langkah.forEach((l, i) => {
    html += `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${l}</div></div>`;
  });
  html += `</div>`;

  // Tip
  if (d.tip) html += `<div class="tip">💡 <strong>Tips:</strong> ${d.tip}</div>`;
  if (d.alert) html += `<div class="alert">⚠️ <strong>Perhatian:</strong> ${d.alert}</div>`;

  document.getElementById("content").innerHTML = html;
}

function onData(jsonStr) {
  try {
    const d = JSON.parse(jsonStr);
    render((d.layanan || "bansos").toLowerCase(), d.pertanyaan || "");
  } catch(e) {
    render("bansos", "");
  }
}

// Default preview
render("bansos", "");
