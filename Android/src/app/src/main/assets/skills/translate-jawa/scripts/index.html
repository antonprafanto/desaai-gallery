      const jwWords = jw.split(' / ');

      const kamus = modeArah === 'jw-id' ? kamusJwId : kamusIdJw;

      // Coba exact match dulu (full phrase)
      const lower = teksAsli.toLowerCase().trim();
      if (kamus[lower]) {
        return { hasil: kamus[lower], mode: 'exact' };
      }

      // Coba kata per kata
      const kata = teksAsli.split(/\s+/);
      const translated = kata.map(k => {
        const key = k.toLowerCase().replace(/[,.!?;:()]/g, '');
        const punctuation = k.match(/[,.!?;:()]+$/) ? k.match(/[,.!?;:()]+$/)[0] : '';
        return (kamus[key] || k) + punctuation;
      });

      const hasilTranslated = translated.join(' ');
      const sudahDiterjemahkan = translated.filter((t, i) => {
        const key = kata[i].toLowerCase().replace(/[,.!?;:()]/g, '');
        return kamus[key] !== undefined;
      }).length;
      const totalKata = kata.length;

      return {
        hasil: hasilTranslated,
        mode: 'per-kata',
        score: sudahDiterjemahkan,
        total: totalKata
      };
    }

    const terjemahan = terjemahkan(teks, arah);
    const arahLabel = arah === 'jw-id' ? 'Jawa → Indonesia' : 'Indonesia → Jawa';

    resultText += `📝 Asli: "${teks}"\n`;
    resultText += `✅ Terjemahan: "${terjemahan.hasil}"\n`;

      if (persen < 100) {
