<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harga Pasar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fff8f0;
      color: #1a1a1a;
      padding: 14px;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #e65100, #ff7043);
      color: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      text-align: center;
    }
    .header h1 { font-size: 17px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 3px; }
    .badge-row { display: flex; gap: 6px; justify-content: center; margin-top: 6px; flex-wrap: wrap; }
    .badge {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 10px;
    }
    .kategori-label {
      font-size: 12px;
      font-weight: 700;
      color: #bf360c;
      padding: 8px 4px 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-bottom: 10px;
    }
    thead tr { background: #bf360c; color: white; }
    thead th {
      padding: 8px 7px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
    }
    tbody tr:nth-child(even) { background: #fff3e0; }
    tbody td {
      padding: 8px 7px;
      font-size: 12px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    .nama { font-weight: 600; color: #212121; }
    .info-kecil { font-size: 10px; color: #757575; margin-top: 1px; }
    .harga-utama { font-size: 13px; font-weight: 700; color: #c62828; }
    .harga-range { font-size: 10px; color: #888; margin-top: 1px; white-space: nowrap; }
    .tren-naik { color: #d32f2f; font-weight: 700; }
    .tren-turun { color: #388e3c; font-weight: 700; }
    .tren-stabil { color: #616161; }
    .tren-fluktuatif { color: #f57c00; font-weight: 700; }
    .disclaimer {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      border-radius: 0 8px 8px 0;
      padding: 9px 12px;
      font-size: 11px;
      color: #6d4c00;
      margin-top: 4px;
      line-height: 1.5;
    }
    .footer {
      text-align: center;
      font-size: 10px;
      color: #9e9e9e;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<script>
  let d;
  try {
    const raw = localStorage.getItem('harga_pasar_data');
    d = raw ? JSON.parse(raw) : {};
  } catch(e) {
    document.body.innerHTML = '<p style="color:red;padding:16px">Error memuat data.</p>';
    throw e;
  }

  const rupiah = (n) => 'Rp ' + Number(n).toLocaleString('id-ID');

  const trenDisplay = {
    naik: { icon: '📈', text: 'Naik', cls: 'tren-naik' },
    turun: { icon: '📉', text: 'Turun', cls: 'tren-turun' },
    stabil: { icon: '➡️', text: 'Stabil', cls: 'tren-stabil' },
    fluktuatif: { icon: '〰️', text: 'Fluktuatif', cls: 'tren-fluktuatif' }
  };

  let html = `
  <div class="header">
    <h1>🛒 Harga Pasar Komoditas</h1>
    <p>${d.filterLabel || 'Semua Komoditas'} &nbsp;|&nbsp; ${d.wilayah || 'Jawa'}</p>
    <div class="badge-row">
      <span class="badge">📅 ${d.tanggal}</span>
      <span class="badge">Offline — DesaAI</span>
    </div>
  </div>
  `;

  (d.data || []).forEach(kat => {
    html += `<div class="kategori-label">${kat.emoji} ${kat.kategori}</div>`;
    html += `<table><thead><tr>
      <th style="width:45%">Komoditas</th>
      <th style="width:30%">Harga</th>
      <th style="width:25%">Tren</th>
    </tr></thead><tbody>`;

    kat.items.forEach(item => {
      const t = trenDisplay[item.tren] || trenDisplay.stabil;
      html += `<tr>
        <td>
          <div class="nama">${item.nama}</div>
          ${item.info ? `<div class="info-kecil">${item.info}</div>` : ''}
        </td>
        <td>
          <div class="harga-utama">${rupiah(item.harga)}/${item.satuan}</div>
          <div class="harga-range">${rupiah(item.min)} – ${rupiah(item.max)}</div>
        </td>
        <td class="${t.cls}">${t.icon} ${t.text}</td>
      </tr>`;
    });

    html += `</tbody></table>`;
  });

  html += `
  <div class="disclaimer">
    ⚠️ <strong>Perhatian:</strong> Data harga ini merupakan referensi rata-rata dan dapat berbeda di pasar lokal Anda. Untuk harga aktual, cek langsung ke pasar induk terdekat atau melalui website <strong>Siskaperbapo</strong> / <strong>Pusdatin Kementan</strong> saat ada koneksi internet.
  </div>
  <div class="footer">DesaAI — Data referensi offline ${d.tanggal}</div>
  `;

  document.body.innerHTML = html;
</script>
</body>
</html>
