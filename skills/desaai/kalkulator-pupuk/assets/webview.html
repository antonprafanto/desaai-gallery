<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Pupuk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0faf0;
      color: #1a1a1a;
      padding: 16px;
      font-size: 14px;
    }
    .header {
      background: linear-gradient(135deg, #2e7d32, #66bb6a);
      color: white;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
      text-align: center;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      margin-top: 6px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 12px;
    }
    thead tr { background: #388e3c; color: white; }
    thead th {
      padding: 10px 8px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
    }
    tbody tr:nth-child(even) { background: #f9fbe7; }
    tbody tr:hover { background: #e8f5e9; }
    tbody td {
      padding: 9px 8px;
      font-size: 12px;
      vertical-align: top;
      border-bottom: 1px solid #e0e0e0;
    }
    .pupuk-nama { font-weight: 600; color: #1b5e20; }
    .tahap { color: #555; font-size: 11px; margin-top: 2px; }
    .fungsi { color: #757575; font-size: 10px; font-style: italic; }
    .jumlah { font-weight: 700; color: #2e7d32; white-space: nowrap; }
    .biaya { color: #e65100; font-weight: 600; white-space: nowrap; }
    .total-card {
      background: linear-gradient(135deg, #e65100, #ff7043);
      color: white;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-card .label { font-size: 12px; opacity: 0.9; }
    .total-card .amount { font-size: 18px; font-weight: 700; }
    .note-box {
      background: #fff8e1;
      border-left: 4px solid #ffa000;
      border-radius: 0 8px 8px 0;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #5d4037;
      line-height: 1.5;
    }
    .note-box.tanah {
      background: #e3f2fd;
      border-left-color: #1976d2;
      color: #0d47a1;
    }
    .footer {
      text-align: center;
      font-size: 10px;
      color: #9e9e9e;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<script>
  let d;
  try {
    const raw = localStorage.getItem('kalkulator_pupuk_data');
    d = raw ? JSON.parse(raw) : {};
  } catch(e) {
    document.body.innerHTML = '<p style="color:red;padding:20px">Error memuat data.</p>';
    throw e;
  }

  const rupiah = (n) => 'Rp ' + Number(n).toLocaleString('id-ID');

  // Build HTML
  let html = `
  <div class="header">
    <h1>${d.emoji || '🌱'} Kalkulator Pupuk</h1>
    <p>${d.tanaman} &nbsp;|&nbsp; Luas: <strong>${d.luas} hektar</strong></p>
    <span class="badge">Offline — DesaAI</span>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:40%">Jenis Pupuk</th>
        <th style="width:22%">Kebutuhan</th>
        <th style="width:22%">Est. Biaya</th>
      </tr>
    </thead>
    <tbody>
  `;

  (d.rows || []).forEach(row => {
    html += `
      <tr>
        <td>
          <div class="pupuk-nama">${row.nama}</div>
          <div class="tahap">⏱ ${row.tahap}</div>
          <div class="fungsi">• ${row.fungsi}</div>
        </td>
        <td><span class="jumlah">${Number(row.kebutuhan).toLocaleString('id-ID')} kg</span></td>
        <td><span class="biaya">${rupiah(row.biaya)}</span></td>
      </tr>
    `;
  });

  html += `</tbody></table>

  <div class="total-card">
    <div class="label">Total Estimasi Biaya Pupuk</div>
    <div class="amount">${rupiah(d.totalBiaya)}</div>
  </div>
  `;

  if (d.catatanTanah) {
    html += `<div class="note-box tanah">🪨 <strong>Kondisi Tanah:</strong> ${d.catatanTanah}</div>`;
  }

  if (d.catatan) {
    html += `<div class="note-box">💡 <strong>Tips:</strong> ${d.catatan}</div>`;
  }

  html += `
  <div class="note-box">
    ⚠️ <strong>Penting:</strong> Dosis ini merupakan acuan umum. Sesuaikan dengan kondisi tanah dan rekomendasi Penyuluh Pertanian Lapangan (PPL) setempat.
  </div>
  <div class="footer">DesaAI — Kalkulasi offline, tidak perlu internet</div>
  `;

  document.body.innerHTML = html;
</script>
</body>
</html>
